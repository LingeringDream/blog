<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav id="navbar">
    <div class="logo"><a href="/" style="text-decoration:none;color:inherit;">✨ 我的博客</a></div>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/archive">归档</a></li>
      <li><a href="/tags">标签</a></li>
      <li><a href="/calendar">日历</a></li>
      <li><a href="/about">关于</a></li>
    </ul>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="icon sun">☀️</span>
      <span class="icon moon">🌙</span>
    </div>
  </nav>

  <main class="container">
    <div class="error-page">
      <div class="error-code">404</div>
      <h1>页面走丢了</h1>
      <p>你要找的页面不存在，也许它去了另一个宇宙。</p>
      <a href="/" class="btn-primary" style="text-decoration:none;margin-top:1.5rem;display:inline-flex;">🏠 回到首页</a>
    </div>
  </main>

  <script src="/app.js"></script>
  <style>
    .error-page {
      text-align: center;
      padding: 6rem 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-page h1 {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .error-page p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
  </style>
</body>
</html>
