<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <!-- 阅读进度条 -->
  <div class="progress-bar" id="progressBar" style="width:0%"></div>

  <!-- 导航栏 -->
  <nav id="navbar">
    <div class="logo">✨ 我的博客</div>
    <ul class="nav-links">
      <li><a href="/" class="active">首页</a></li>
      <li><a href="/admin">管理</a></li>
    </ul>
    <div class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="icon sun">☀️</span>
      <span class="icon moon">🌙</span>
    </div>
  </nav>

  <!-- 主容器 -->
  <main class="container page-transition">
    <!-- 搜索框 -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索文章... (Ctrl+K)">
    </div>

    <!-- 文章列表 -->
    <div class="articles-container" id="articlesContainer">
      <div id="skeletonLoader">
        <article class="skeleton-article">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text" style="width:60%"></div>
        </article>
        <article class="skeleton-article">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text" style="width:50%"></div>
        </article>
      </div>
      <div id="articlesGrid" class="articles-grid"></div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" title="返回顶部">↑</button>

  <!-- 文章详情模态框 -->
  <div class="modal" id="articleModal">
    <div class="modal-content">
      <div class="modal-header">
        <button class="btn btn-secondary" id="shareArticle" title="分享文章">分享</button>
        <button class="btn btn-secondary" id="closeModal">✕</button>
      </div>
      <div id="articleContent"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
