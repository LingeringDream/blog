<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary_large_image">
  <title>文章 - 我的博客</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <!-- 阅读进度条 -->
  <div class="progress-bar" id="progressBar" style="width:0%"></div>

  <!-- 导航栏 -->
  <nav id="navbar">
    <div class="logo"><a href="/" style="text-decoration:none;color:inherit;">✨ 我的博客</a></div>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/admin">管理</a></li>
    </ul>
    <div class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="icon sun">☀️</span>
      <span class="icon moon">🌙</span>
    </div>
  </nav>

  <!-- 文章详情 -->
  <main class="container">
    <article class="post-detail">
      <div id="cover-container" class="cover-container"></div>
      <h1 id="post-title"></h1>
      <div class="meta" id="post-meta"></div>
      <div class="tags" id="post-tags"></div>
      <div class="content" id="post-content"></div>
      <div style="margin-top:3rem;text-align:center;">
        <a href="/" class="btn btn-secondary">← 返回首页</a>
      </div>
    </article>
  </main>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" title="返回顶部">↑</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
